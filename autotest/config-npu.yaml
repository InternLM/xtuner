    npu-qwen3-sft-16nums:
        -
            type: sft
            parameters:
                config: autotest/config/npu_qwen3_16nums.py
                output_path: /mnt/hwfile/llmrazor/qa-llm-cicd/test_output
            resource:
                num_nodes: 2
                envs:
                    - QWEN3_MOE_PATH=/mnt/hwfile/llmrazor/qa-llm-cicd/qa_test_models/Qwen3-30B-A3B
                    - ALPACA_PATH=/mnt/hwfile/llmrazor/qa-llm-cicd/xtuner_resource/datasets/alpaca
                    - XTUNER_DETERMINISTIC=true
                    - TORCH_NPU_USE_HCCL=1
                    - PIP_INDEX_URL=http://pkg.pjlab.org.cn/repository/pypi-tsinghua/simple
                    - PIP_TRUSTED_HOST=pkg.pjlab.org.cn
            assert_info:
                base_metric: npu-qwen3-sft/812c1021/tracker.jsonl
                check_metrics:
                    grad_norm: 0.000001
                    loss/reduced_llm_loss: 0.000001
                    lr: 0
            timeout: 10800

    npu-qwen3-sft-celoss-vs-gpu:
        -
            type: sft
            parameters:
                config: autotest/config/npu_qwen3_sft_celoss.py
                output_path: /mnt/hwfile/llmrazor/qa-llm-cicd/test_output
            resource:
                num_nodes: 1
                envs:
                    - QWEN3_MOE_PATH=/mnt/hwfile/llmrazor/qa-llm-cicd/qa_test_models/Qwen3-30B-A3B
                    - ALPACA_PATH=/mnt/hwfile/llmrazor/qa-llm-cicd/xtuner_resource/datasets/alpaca
                    - XTUNER_DETERMINISTIC=true
                    - TORCH_NPU_USE_HCCL=1
                    - PIP_INDEX_URL=http://pkg.pjlab.org.cn/repository/pypi-tsinghua/simple
                    - PIP_TRUSTED_HOST=pkg.pjlab.org.cn
            assert_info:
                base_metric: npu-qwen3-sft-celoss-vs-gpu/812c1021/tracker.jsonl
                check_metrics:
                    grad_norm: 0.02
                    loss/reduced_llm_loss: 0.01
                    lr: 0.01
            timeout: 10800

    npu-qwen3-rl-vllm-vs-gpu:
        -
            type: rl
            parameters:
                config: autotest/config/rl_qwen3_30B_grpo_gpu_vs_npu.py
                infer_backend: vllm
                output_path: /mnt/hwfile/llmrazor/qa-llm-cic/qa-llm-cicd/test_output
            resource:
                image: ccr-hw/910c:rl_s1_vllm
                envs:
                    - MODEL_PATH=/mnt/hwfile/llmrazor/qa-llm-cicd/qa_test_models/Qwen3-30B-A3B
                    - DATA_PATH=/mnt/hwfile/llmrazor/qa-llm-cicd/xtuner_resource/datasets/gsm8k/train-mini.jsonl
                    - EVAL_DATA_PATH=/mnt/hwfile/llmrazor/qa-llm-cicd/xtuner_resource/datasets/gsm8k/test.jsonl
                    - XTUNER_DETERMINISTIC=true
                    - XTUNER_USE_LMDEPLOY=0
                    - XTUNER_USE_VLLM=1
                    - XTUNER_USE_SGLANG=0
            assert_info:
                base_metric: npu-qwen3-rl-vllm-vs-gpu/00f7e16/tracker.jsonl
                check_metrics:
                    - 
                       metric:  eval/accuracy
                       threshold: 0.05
                       method: absolute
                       operator: <
                    -
                       metric: response/rewards/mean
                       threshold: 0.1
                       method: absolute
                       operator: <
                    - 
                       metric:  mismatch/mismatch_k3_kl
                       threshold: 0.0001
                       method: absolute
                       operator: <=
                    -
                       metric: response/response_len/mean
                       threshold: 0.12
                       method: relative
                       operator: <
                    -
                       metric: time/step
                       threshold: 10
                       method: absolute
                       operator: <
            timeout: 5500
