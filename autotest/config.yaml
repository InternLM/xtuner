base_path:
    base_output_path: /mnt/shared-storage-user/llmrazor-share/qa-llm-cicd/test_output
    base_baseline_path: /mnt/shared-storage-user/llmrazor-share/qa-llm-cicd/xtuner-baselines/latest

default_config:
    train: 
        resource:
            gpus_per_task: 8
            cpus_per_task: 120
            memory_per_task: 512
            image: ailab-llmrazor/xtuner:pt29_latest
            pip_package: pip install -e .[all]; pip install more-itertools
            envs: 
                - HF_HUB_CACHE=/mnt/shared-storage-user/auto-eval-pipeline/opencompass/models/hf_hub
    eval:
        resource:
            gpus_per_task: 0
            cpus_per_task: 16
            memory_per_task: 128
            image: ailab-puyu/auto-eval:ld_0101_oc_8ee07ac_v3
            envs: 
                - HF_HUB_CACHE=/mnt/shared-storage-user/auto-eval-pipeline/opencompass/models/hf_hub
                - HF_DATASETS_CACHE=/mnt/shared-storage-user/auto-eval-pipeline/opencompass/llmeval/hf_cache
                - COMPASS_DATA_CACHE=/mnt/shared-storage-user/auto-eval-pipeline/opencompass/llmeval/compass_data_cache
                - HF_DATASETS_OFFLINE=1
                - HF_HUB_OFFLINE=1

case: 
    qwen3-sft:
        -
            type: sft
            parameters:
                config: autotest/config/qwen3.py
                output_path: /mnt/shared-storage-user/llmrazor-share/qa-llm-cicd/test_output
            resource:
                envs: 
                    - QWEN3_MOE_PATH=/mnt/shared-storage-user/llmrazor-share/model/Qwen3-30B-A3B
                    - ALPACA_PATH=/mnt/shared-storage-user/llmrazor-share/data/alpaca
                    - XTUNER_DETERMINISTIC=true
            assert_info:
                base_metric: qwen3-sft/tracker.jsonl
                check_metrics:
                    grad_norm: 0.000001
                    loss/maxvio: 0.000001
                    loss/local_loss: 0.000001
                    loss/reduced_balancing_loss: 0.000001
                    loss/reduced_llm_loss: 0.000001
                    lr: 0
                    memory/max_memory_GB: 0.2
                    runtime_info/tgs: 0.05
                    runtime_info/text_tokens: 0
            timeout: 1500

    qwen3-sft-ep8:
        -
            type: sft
            phase: first
            parameters:
                config: autotest/config/qwen3_moe_30BA3_ep8.py
                output_path: /mnt/shared-storage-user/llmrazor-share/qa-llm-cicd/test_output
            resource:
                num_nodes: 2
                cpus_per_task: 80
                envs:
                    - QWEN3_MOE_PATH=/mnt/shared-storage-user/llmrazor-share/model/Qwen3-30B-A3B
                    - ALPACA_PATH=/mnt/shared-storage-user/llmrazor-share/data/alpaca
                    - XTUNER_DETERMINISTIC=true
            assert_info:
                base_metric: qwen3-sft-ep8/tracker.jsonl
                check_metrics:
                    grad_norm: 0.000001
                    loss/maxvio: 0.000001
                    loss/local_loss: 0.000001
                    loss/reduced_balancing_loss: 0.000001
                    loss/reduced_llm_loss: 0.000001
                    lr: 0
                    memory/max_memory_GB: 0.2
                    runtime_info/tgs: 0.05
                    runtime_info/text_tokens: 0
            timeout: 1500
        -
            type: sft
            phase: resume
            pre_action:
                command: 'python ./autotest/utils/update_meta.py /mnt/shared-storage-user/llmrazor-share/qa-llm-cicd/test_output qwen3-sft-ep8 sft'
            parameters:
                config: autotest/config/qwen3_moe_30BA3_ep8_resume.py
                output_path: /mnt/shared-storage-user/llmrazor-share/qa-llm-cicd/test_output
            resource:
                num_nodes: 2
                cpus_per_task: 80
                envs:
                    - QWEN3_MOE_PATH=/mnt/shared-storage-user/llmrazor-share/model/Qwen3-30B-A3B
                    - ALPACA_PATH=/mnt/shared-storage-user/llmrazor-share/data/alpaca
                    - XTUNER_DETERMINISTIC=true
            assert_info:
                base_metric: qwen3-sft-ep8/tracker-resume.jsonl
                check_metrics:
                    grad_norm: 0.000001
                    loss/maxvio: 0.000001
                    loss/local_loss: 0.000001
                    loss/reduced_balancing_loss: 0.000001
                    loss/reduced_llm_loss: 0.000001
                    lr: 0
                    memory/max_memory_GB: 0.2
                    runtime_info/text_tokens: 0
            post_action:
                command: 'python ./autotest/utils/resume_validation.py /mnt/shared-storage-user/llmrazor-share/qa-llm-cicd/test_output qwen3-sft-ep8 sft 10 "runtime_info/text_tokens,runtime_info/efficient_attn_ratio,loss/reduced_balancing_loss,loss/reduced_llm_loss,loss/local_loss"'
            timeout: 1500

