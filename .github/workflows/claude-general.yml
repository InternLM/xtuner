name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude-review:
    if: |
      github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude review')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
              REPO: ${{ github.repository }}
              PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}

              Please review this pull request.

              You can use multiple subagents to parallelize tasks. Each subagent should be told the PR title and description.

              Use `gh pr view <PR NUMBER> --comments` and `gh pr diff <PR NUMBER> --patch` to access the PR content.
              You are in repository without that patch applied. Do not apply it.
              Assume the patch will be build and tested by other GitHub Actions workflows.

              Focus on:
              - Code quality, style, and best practices
              - Potential bugs, issues, incorrect logic
              - Security implications
              - .claude/CLAUDE.md compliance

              For every issue, rate how significant it is. Make sure you are confident in your diagnosis.

              Provide detailed feedback as PR comments, using inline comments for specific issues.
              Use `gh pr comment ${{ github.event.pull_request.number }} --body "..."` for top-level summary. Keep it short.
              Use `mcp__github_inline_comment__create_inline_comment` to highlight specific code issues.
              Prefix all your GitHub comments with "Claude: ".
              Use `gh pr view <PR NUMBER> --comments` output to make sure you don't comment about the same issue twice.

              When linking to code in inline comments, follow the following format precisely, otherwise the Markdown preview
              won't render correctly: https://github.com/${{ github.repository }}/blob/${{ github.event.pull_request.head.sha }}/README.md#L10-L15
          claude_args: |
              --max-turns 30
              --model claude-opus-4-6
              --allowedTools "
                Read,Write,Edit,MultiEdit,LS,Grep,Glob,
                Bash(cat:*),Bash(test:*),Bash(printf:*),Bash(jq:*),Bash(head:*),Bash(git:*),Bash(gh:*),
                mcp__github_inline_comment__create_inline_comment,
                "
          allowed_non_write_users: "*"
          track_progress: false

  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && !contains(github.event.comment.body, '@claude review')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
              --max-turns 50
              --model claude-opus-4-6
              --allowedTools "
                Read,Write,Edit,MultiEdit,LS,Grep,Glob,
                Bash(cat:*),Bash(test:*),Bash(printf:*),Bash(jq:*),Bash(head:*),Bash(git:*),Bash(gh:*),
                mcp__github_inline_comment__create_inline_comment,
              --append-system-prompt "
                REPO: ${{ github.repository }}
                PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
                COMMENT: ${{ github.event.comment.body || github.event.review.body }}
                COMMENTER: ${{ github.event.comment.user.login || github.event.review.user.login }}

                You are assisting a developer on a pull request. First, orient yourself:
                1. Run `gh pr view <PR NUMBER> --comments` to read the PR description and full discussion history.
                2. Run `gh pr diff <PR NUMBER> --patch` to understand the code changes.

                You are in the repository *without* the patch applied. Do not apply it.

                Then respond to the request from @${{ github.event.comment.user.login || github.event.review.user.login }}:
                > ${{ github.event.comment.body || github.event.review.body }}

                Guidelines:
                - Prefix all your GitHub comments with "Claude: ".
                - Use `gh pr comment <PR NUMBER> --body "..."` to post a top-level reply.
                - Use `mcp__github_inline_comment__create_inline_comment` for inline code comments.
                - Check existing comments with `gh pr view <PR NUMBER> --comments` to avoid repeating yourself.
                - When linking to code, use this format exactly:
                  https://github.com/${{ github.repository }}/blob/${{ github.event.pull_request.head.sha }}/path/to/file.ext#L10-L15
                "
          allowed_non_write_users: "*"
          track_progress: false
